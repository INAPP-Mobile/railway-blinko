<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0F0F23"/><stop offset="100%" stop-color="#060610"/></linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7C3AED"/><stop offset="100%" stop-color="#6C3FC5"/></linearGradient>
    <linearGradient id="bolt2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#A78BFA"/><stop offset="100%" stop-color="#8B5CF6"/></linearGradient>
  </defs>
  <rect width="800" height="800" rx="120" fill="url(#bg)"/>
  <circle cx="400" cy="400" r="200" stroke="#7C3AED" stroke-width="1.5" opacity="0.1"/>
  <!-- Lightning bolt -->
  <g transform="translate(400,400)">
    <polygon points="-40,-180 20,-10 -10,-10 30,180 -30,10 20,10" fill="url(#bolt)"/>
    <polygon points="-30,-160 15,-10 -5,-10 20,160 -20,10 15,10" fill="url(#bolt2)" opacity="0.5"/>
  </g>
</svg>